        function getStars(seed) {
            const v = (seed % 30) + 70;
            const s = Math.min(Math.ceil(v / 20), 5);
            return '★'.repeat(s) + '☆'.repeat(5 - s);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function getZodiacFortune() {
            const zodiac = document.getElementById('zodiac-select').value;
            if (!zodiac) { alert('请选择星座！'); return; }
            const data = zodiacData[zodiac];
            const seed = new Date().getDate() + zodiac.charCodeAt(0);
            document.getElementById('zodiac-icon').textContent = data.icon;
            document.getElementById('zodiac-name').textContent = data.name;
            document.getElementById('overall-score').textContent = getStars(seed);
            document.getElementById('love-score').textContent = getStars(seed + 1);
            document.getElementById('career-score').textContent = getStars(seed + 2);
            document.getElementById('money-score').textContent = getStars(seed + 3);
            document.getElementById('health-score').textContent = getStars(seed + 4);
            document.getElementById('fortune-text').textContent = fortuneTexts[zodiac].overall;
            document.getElementById('zodiac-result').classList.add('show');
        }

        function getChineseFortune() {
            const zodiac = document.getElementById('chinese-zodiac-select').value;
            if (!zodiac) { alert('请选择生肖！'); return; }
            const data = chineseData[zodiac];
            const seed = 2026 + zodiac.charCodeAt(0);
            document.getElementById('chinese-icon').textContent = data.icon;
            document.getElementById('chinese-name').textContent = data.name;
            document.getElementById('year-score').textContent = getStars(seed);
            document.getElementById('career-score-c').textContent = getStars(seed + 1);
            document.getElementById('money-score-c').textContent = getStars(seed + 2);
            document.getElementById('health-score-c').textContent = getStars(seed + 3);
            document.getElementById('chinese-fortune-text').textContent = chineseFortuneTexts[zodiac];
            document.getElementById('chinese-result').classList.add('show');
        }

        function checkCompatibility() {
            const your = document.getElementById('your-zodiac').value;
            const their = document.getElementById('their-zodiac').value;
            if (!your || !their) { alert('请选择两个星座！'); return; }
            const key = your + '-' + their;
            const revKey = their + '-' + your;
            let compat = compatibilityData[key] || compatibilityData[revKey];
            if (!compat) { compat = { score: 75, text: "两个星座的组合需要时间来验证缘分，请珍惜彼此！" }; }
            document.getElementById('your-icon').textContent = zodiacData[your].icon;
            document.getElementById('their-icon').textContent = zodiacData[their].icon;
            document.getElementById('your-name').textContent = zodiacData[your].name;
            document.getElementById('their-name').textContent = zodiacData[their].name;
            document.getElementById('compat-score').textContent = compat.score + '%';
            document.getElementById('compat-text').textContent = compat.text;
            document.getElementById('compat-result').classList.add('show');
        }
